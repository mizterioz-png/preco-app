<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preço Inteligente</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f9; }

header {
  background:#1e88e5;
  color:white;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.container { max-width:720px; margin:auto; padding:12px; }

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

input, select {
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ddd;
}

button { cursor:pointer; }

.item {
  padding:10px;
  border-bottom:1px solid #eee;
}

.top {
  display:flex;
  justify-content:space-between;
}

.delete {
  background:red;
  color:white;
  border:none;
  padding:5px 8px;
  border-radius:6px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.nav button {
  flex:1;
  padding:12px;
  border:none;
  background:none;
}

.tab { display:none; }
.tab.active { display:block; }

.highlight { color:green; font-weight:bold; }
</style>
</head>

<body>

<header>📊 Preço Inteligente</header>

<div class="container">

<!-- FORM -->
<div id="tab-add" class="tab active card">
<h3>➕ Adicionar</h3>

<input id="produto" placeholder="Produto">

<select id="categoria">
  <option>Carnes</option>
  <option>Hortifruti</option>
  <option>Limpeza</option>
  <option>Laticínios</option>
  <option>Padaria</option>
  <option>Outros</option>
</select>

<input id="mercado" placeholder="Mercado">
<input id="preco" type="number" placeholder="Preço">
<input id="data" type="date">

<button onclick="salvarItem()" style="margin-top:10px;width:100%;padding:10px;background:#1e88e5;color:white;border:none;border-radius:8px;">
Salvar
</button>
</div>

<!-- GRÁFICO -->
<div id="tab-chart" class="tab card">
<h3>📈 Gráfico</h3>

<select id="filtroCategoria" onchange="renderizar()"></select>

<canvas id="chart"></canvas>

<div id="melhor"></div>
</div>

<!-- RANKING -->
<div id="tab-ranking" class="tab card">
<h3>🏆 Ranking</h3>
<div id="ranking"></div>
</div>

<!-- HISTÓRICO -->
<div id="tab-list" class="tab card">
<h3>🧾 Histórico</h3>
<div id="lista"></div>
</div>

</div>

<div class="nav">
<button onclick="openTab('add')">➕</button>
<button onclick="openTab('chart')">📈</button>
<button onclick="openTab('ranking')">🏆</button>
<button onclick="openTab('list')">🧾</button>
</div>

<script>

let dados = JSON.parse(localStorage.getItem("dados")) || [];

function salvarStorage() {
  localStorage.setItem("dados", JSON.stringify(dados));
}

function salvarItem() {
  const item = {
    produto: produto.value,
    categoria: categoria.value,
    mercado: mercado.value,
    preco: parseFloat(preco.value),
    data: data.value
  };

  if(!item.produto || !item.mercado || !item.preco || !item.data) {
    alert("Preencha todos os campos");
    return;
  }

  dados.push(item);
  salvarStorage();
  limpar();
  atualizar();
}

function limpar(){
  produto.value = "";
  mercado.value = "";
  preco.value = "";
  data.value = "";
}

function deletar(i){
  if(!confirm("Excluir?")) return;
  dados.splice(i,1);
  salvarStorage();
  atualizar();
}

function openTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
}

function categorias(){
  return [...new Set(dados.map(d=>d.categoria))];
}

function carregarFiltro(){
  const f = document.getElementById("filtroCategoria");
  const cats = categorias();
  f.innerHTML = cats.map(c=>`<option>${c}</option>`).join("");
}

function getCategoria(){
  const f = document.getElementById("filtroCategoria");
  return f.value || dados[0]?.categoria;
}

function melhor(cat){
  let map = {};

  dados.filter(d=>d.categoria===cat).forEach(d=>{
    if(!map[d.mercado]) map[d.mercado]=[];
    map[d.mercado].push(d.preco);
  });

  let best="", min=Infinity;

  for(let m in map){
    let media = map[m].reduce((a,b)=>a+b)/map[m].length;
    if(media<min){min=media;best=m;}
  }

  return {best,min};
}

let chart;

function grafico(cat){
  let f = dados.filter(d=>d.categoria===cat);

  let labels = f.map(d=>d.data);
  let values = f.map(d=>d.preco);

  if(chart) chart.destroy();

  chart = new Chart(chartCanvas,{
    type:"line",
    data:{labels,datasets:[{label:"Preço",data:values}]}
  });
}

function ranking(cat){
  let map={};

  dados.filter(d=>d.categoria===cat).forEach(d=>{
    if(!map[d.mercado]) map[d.mercado]=[];
    map[d.mercado].push(d.preco);
  });

  let r = Object.keys(map).map(m=>({
    mercado:m,
    media: map[m].reduce((a,b)=>a+b)/map[m].length
  })).sort((a,b)=>a.media-b.media);

  rankingDiv.innerHTML = r.map(x=>`🏪 ${x.mercado} - R$ ${x.media.toFixed(2)}`).join("<br>");
}

function lista(){
  listaDiv.innerHTML = dados.length ? dados.map((d,i)=>`
    <div class="item">
      <div class="top">
        <strong>${d.produto}</strong>
        <button class="delete" onclick="deletar(${i})">X</button>
      </div>
      ${d.categoria} | 🏪 ${d.mercado} | 📅 ${d.data}<br>
      💰 R$ ${d.preco}
    </div>
  `).join("") : "<p>Nenhum registro</p>";
}

function atualizar(){
  carregarFiltro();

  const cat = getCategoria();

  if(!cat) return;

  filtroCategoria.value = cat;

  const m = melhor(cat);

  melhorDiv.innerHTML = `<h4>🟢 Melhor: ${m.best} - R$ ${m.min.toFixed(2)}</h4>`;

  ranking(cat);
  grafico(cat);
  lista();
}

const rankingDiv = document.getElementById("ranking");
const listaDiv = document.getElementById("lista");
const chartCanvas = document.getElementById("chart");
const melhorDiv = document.getElementById("melhor");
const filtroCategoria = document.getElementById("filtroCategoria");

atualizar();

</script>

</body>
</html>
